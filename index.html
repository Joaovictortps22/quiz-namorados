<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#6E1E3A" />
  <title>Nosso Amor Eterno 💗</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/css/tokens.css" />
  <link rel="stylesheet" href="src/css/base.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <link rel="stylesheet" href="src/css/screens.css" />
  <link rel="stylesheet" href="src/css/vales.css" />
  <link rel="stylesheet" href="src/css/album.css" />

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <!-- Fundo decorativo (corações flutuantes) -->
  <div class="bg-hearts" aria-hidden="true"></div>

  <main id="app">

    <!-- ===================== LOGIN ===================== -->
    <section class="screen" id="screen-login" data-screen="login">
      <div class="login-wrap">
        <div class="login-crest" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="56" height="56" fill="none">
            <path d="M12 21s-7.5-4.6-10-9.2C.4 8.4 2 5 5.4 5c2 0 3.4 1.1 4.1 2.3C10.2 6.1 11.6 5 13.6 5 17 5 18.6 8.4 17 11.8 14.5 16.4 12 21 12 21z" fill="var(--rose-600)"/>
          </svg>
        </div>
        <h1 class="login-title">João &amp; Rafaela</h1>
        <p class="login-sub">Amor eterno</p>

        <form id="login-form" class="login-form" autocomplete="off" novalidate>
          <label class="field">
            <span class="field-label">Usuário</span>
            <input type="text" id="login-user" inputmode="text" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="seu usuário secreto" />
          </label>
          <label class="field">
            <span class="field-label">Senha</span>
            <input type="password" id="login-pass" inputmode="numeric" placeholder="••••••••" />
          </label>
          <p class="login-error" id="login-error" role="alert" hidden></p>
          <button type="submit" class="btn btn-primary btn-block">Entrar 💗</button>
        </form>
        <p class="login-hint">feito com amor, só pra você ❤️</p>
      </div>
    </section>

    <!-- ===================== HOME ===================== -->
    <section class="screen" id="screen-home" data-screen="home" hidden>
      <header class="home-header">
        <p class="home-greeting">Oi, meu amor 💗</p>
        <h1 class="home-title">Nosso Dia dos Namorados</h1>
        <p class="home-desc">Preparei uma surpresa pra você. Comece pelo quiz — no final tem prêmio garantido. 😉</p>
      </header>

      <div class="home-cards">
        <button class="big-card big-card--quiz" data-action="go-quiz">
          <span class="big-card-icon" data-icon="clipboard"></span>
          <span class="big-card-body">
            <span class="big-card-title">Começar o Quiz</span>
            <span class="big-card-sub">8 perguntas sobre a gente</span>
          </span>
          <span class="big-card-arrow" data-icon="arrowRight"></span>
        </button>

        <button class="big-card big-card--locked" id="card-prizes" data-action="go-prizes">
          <span class="big-card-icon" data-icon="gift"></span>
          <span class="big-card-body">
            <span class="big-card-title">Prêmios &amp; Vales</span>
            <span class="big-card-sub" data-sub-locked>Conclua o quiz para liberar</span>
          </span>
          <span class="lock-badge" aria-hidden="true"></span>
        </button>

        <button class="big-card big-card--locked" id="card-album" data-action="go-album">
          <span class="big-card-icon" data-icon="book"></span>
          <span class="big-card-body">
            <span class="big-card-title">Álbum de Figurinhas</span>
            <span class="big-card-sub" data-sub-locked>Conclua o quiz para liberar</span>
          </span>
          <span class="lock-badge" aria-hidden="true"></span>
        </button>
      </div>

      <footer class="home-footer">
        <button class="link-muted" id="reset-btn" hidden>reiniciar tudo</button>
      </footer>
    </section>

    <!-- ===================== QUIZ ===================== -->
    <section class="screen" id="screen-quiz" data-screen="quiz" hidden>
      <header class="quiz-top">
        <button class="btn-icon" data-action="go-home" aria-label="Sair do quiz">←</button>
        <div class="progress" aria-hidden="true"><div class="progress-bar" id="quiz-progress"></div></div>
        <span class="quiz-count" id="quiz-count">1/8</span>
      </header>
      <div class="quiz-body" id="quiz-body"></div>
      <footer class="quiz-nav">
        <button class="btn btn-ghost" id="quiz-prev">Anterior</button>
        <button class="btn btn-primary" id="quiz-next" disabled>Próxima</button>
      </footer>
    </section>

    <!-- ===================== RESULTADO ===================== -->
    <section class="screen" id="screen-result" data-screen="result" hidden></section>

    <!-- ===================== REVISÃO ===================== -->
    <section class="screen" id="screen-review" data-screen="review" hidden></section>

    <!-- ===================== PRÊMIOS ===================== -->
    <section class="screen" id="screen-prizes" data-screen="prizes" hidden></section>

    <!-- ===================== ÁLBUM ===================== -->
    <section class="screen" id="screen-album" data-screen="album" hidden></section>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <!-- Modal genérico -->
  <div class="modal-overlay" id="modal" hidden>
    <div class="modal-sheet" id="modal-sheet" role="dialog" aria-modal="true"></div>
  </div>

  <script src="src/js/storage.js"></script>
  <script src="src/js/icons.js"></script>
  <script src="src/js/router.js"></script>
  <script src="src/js/auth.js"></script>
  <script src="src/js/quiz-data.js"></script>
  <script src="src/js/quiz.js"></script>
  <script src="src/js/result.js"></script>
  <script src="src/js/review.js"></script>
  <script src="src/js/vales-data.js"></script>
  <script src="src/js/fotos.js"></script>
  <script src="src/js/prizes.js"></script>
  <script src="src/js/album.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
